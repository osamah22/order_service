definitions:
  dtos.CreateOrderRequest:
    properties:
      items:
        items:
          properties:
            product_id:
              type: string
            quantity:
              type: integer
          required:
          - product_id
          - quantity
          type: object
        type: array
    required:
    - items
    type: object
  dtos.CreateProductRequest:
    properties:
      available_stocks:
        minimum: 0
        type: integer
      name:
        type: string
      price_in_cents:
        minimum: 0
        type: integer
    required:
    - available_stocks
    - name
    - price_in_cents
    type: object
  dtos.LineItemResponse:
    properties:
      price_in_cents:
        type: integer
      product_id:
        type: string
      quantity:
        type: integer
    type: object
  dtos.OrderResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/dtos.LineItemResponse'
        type: array
      total:
        type: integer
    type: object
  dtos.UpdateProductRequest:
    properties:
      available_stocks:
        minimum: 0
        type: integer
      name:
        type: string
      price_in_cents:
        minimum: 0
        type: integer
    required:
    - available_stocks
    - name
    - price_in_cents
    type: object
  models.LineItem:
    properties:
      id:
        type: string
      orderID:
        type: string
      priceInCents:
        format: int64
        type: integer
      productID:
        type: string
      quantity:
        type: integer
    type: object
  models.Order:
    properties:
      createdAt:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/models.LineItem'
        type: array
      status:
        $ref: '#/definitions/models.OrderStatus'
      total:
        format: int64
        type: integer
    type: object
  models.OrderStatus:
    enum:
    - pending
    - completed
    - cancelled
    type: string
    x-enum-varnames:
    - StatusPending
    - StatusCompleted
    - StatusCancelled
  models.Product:
    properties:
      availableStock:
        type: integer
      id:
        type: string
      name:
        type: string
      priceInCents:
        format: int64
        type: integer
    type: object
info:
  contact: {}
paths:
  /orders:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Order'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all orders
      tags:
      - orders
    post:
      consumes:
      - application/json
      parameters:
      - description: Order data
        in: body
